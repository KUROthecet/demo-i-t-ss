<app-ambient-background />

<div class="login-page">
  <div class="login-container">
    
        <div class="login-header">
      <div class="login-header__icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1 class="login-header__title">Staff Portal</h1>
      <p class="login-header__subtitle">Sign in to manage AIMS operations</p>
    </div>

        <div class="login-card glass-panel">
            @if (error) {
        <div class="login-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ error }}
        </div>
      }

      <form (ngSubmit)="login()" class="login-form">
        
                <div class="role-grid">
          <button 
            type="button" 
            class="role-btn" 
            [class.role-btn--active]="selectedRole === 'admin'"
            (click)="selectRole('admin')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="role-btn__icon">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span class="role-btn__text">Admin</span>
          </button>

          <button 
            type="button" 
            class="role-btn" 
            [class.role-btn--active]="selectedRole === 'pm'"
            (click)="selectRole('pm')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="role-btn__icon">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
            <span class="role-btn__text">Product Mgr</span>
          </button>
        </div>

                <div class="input-group">
          <label class="input-label">Staff ID</label>
          <input 
            type="text" 
            class="input-field" 
            [(ngModel)]="username" 
            name="username" 
            required>
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <input 
            type="password" 
            class="input-field" 
            [(ngModel)]="password" 
            name="password" 
            required>
        </div>

                <button 
          type="submit" 
          class="submit-btn btn-sheen-wrapper" 
          [disabled]="loading">
          <div class="btn-sheen"></div>
          @if (loading) {
            <div class="spinner"></div>
          } @else {
            <span>Sign In</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="submit-btn__arrow">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          }
        </button>
      </form>
    </div>
  </div>
</div>
