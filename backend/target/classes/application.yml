spring:
  application:
    name: aims-backend

  # ===== DATABASE =====
  datasource:
    url: jdbc:postgresql://localhost:5435/aims_db?reWriteBatchedInserts=true
    username: aims_user
    password: aims_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ===== JPA / HIBERNATE =====
  jpa:
    hibernate:
      ddl-auto: update        # creates/updates schema automatically
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ===== REDIS =====
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ===== MAIL (MOCK — logs to console) =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: aims.noreply@gmail.com
    password: mock-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ===== SERVER =====
server:
  port: 8080
  servlet:
    context-path: /

# ===== JWT CONFIGURATION =====
app:
  jwt:
    secret: AIMSShopSecretKeyForJWTTokenGeneration2026MustBe256BitsLong!
    expiration-ms: 86400000   # 24 hours

# ===== LOGGING =====
logging:
  level:
    com.aims: INFO
    org.springframework.security: WARN
