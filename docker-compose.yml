
services:

  # ===== PostgreSQL Database =====
  db:
    image: postgres:15-alpine
    container_name: aims_postgres
    environment:
      POSTGRES_USER: aims_user
      POSTGRES_PASSWORD: aims_password
      POSTGRES_DB: aims_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aims_user -d aims_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis Cache =====
  redis:
    image: redis:7-alpine
    container_name: aims_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
